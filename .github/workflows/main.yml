name: weixin
on:
  workflow_dispatch:
  schedule: 
    - cron: '0 23 * * *'
jobs:
  build:
    runs-on: ubuntu-24.04  # 改为Ubuntu 24.04，默认支持Node.js 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用Node.js 24
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9.12
      - name: Set timezone
        run: |
          sudo cp /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
      - name: install pip packages
        run: |
          python -m pip install --upgrade pip
          pip install requests zhdate
      - name: weixin
        run: |
          python main.py
