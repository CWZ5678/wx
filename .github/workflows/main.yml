name: weixin
on:
  workflow_dispatch:
  schedule: 
    - cron: '0 23 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # 从 v2 升级到 v4
      - name: Set up Python
        uses: actions/setup-python@v5  # 从 v2 升级到 v5
        with:
          python-version: 3.9.12
      - name: Set timezone
        run: |
          sudo cp /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
      - name: install pip packages
        run: |
          python -m pip install --upgrade pip
          pip install requests zhdate
      - name: weixin
        run: |
          python main.py
