name: weixin
on:
  workflow_dispatch:
  schedule: 
    - cron: '0 23 * * *'
jobs:
  build:
    runs-on: ubuntu-22.04  # 或 ubuntu-24.04，指定一个确定版本而非 latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 提前切换到 Node.js 24 环境
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9.12
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests zhdate
      - name: Run script
        run: python main.py
