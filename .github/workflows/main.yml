name: Daily WeChat Reminder

on:
  workflow_dispatch: # 允许手动触发
  schedule:
    - cron: '0 23 * * *'  # UTC 23:00，即北京时间次日上午7:00

jobs:
  send-message:
    runs-on: ubuntu-24.04  # 使用Ubuntu 24.04镜像，其默认环境已更新
    # env 部分可以移除，因为ubuntu-24.04默认已支持Node.js 24
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Main Script
        run: python main.py
